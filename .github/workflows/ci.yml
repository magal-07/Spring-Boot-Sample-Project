name: Continuous Integration Process

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest # Вибір ОС 

    steps:
      - name: Clone the project
        uses: actions/checkout@v4 # Клонування 

      - name: Install software (JDK 11)
        uses: actions/setup-java@v4 # Встановлення Java 
        with:
          java-version: '11' # Змінюємо 17 на 11 
          distribution: 'zulu'

      - name: Download dependencies
        run: mvn install -DskipTests # Завантаження залежностей 

      - name: Create project build
        run: mvn package -DskipTests # Створення білду 

      - name: Run unit tests
        run: mvn test # Запуск тестів 

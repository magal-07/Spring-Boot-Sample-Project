name: Continuous Integration Process

# 1. Тригери: push та ручний запуск 
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build_and_test:
    # 2. Вибір операційної системи 
    runs-on: ubuntu-latest

    steps:
      # 3. Клонування проєкту 
      - name: Clone the project
        uses: actions/checkout@v3

      # 4. Встановлення програмного забезпечення (JDK)
      - name: Install software (JDK 17)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      # 5. Завантаження залежностей 
      - name: Download dependencies
        run: mvn install -DskipTests

      # 6. Створення білду проєкту 
      - name: Create project build
        run: mvn package -DskipTests

      # 7. Запуск юніт-тестів 
      - name: Run unit tests
        run: mvn test
